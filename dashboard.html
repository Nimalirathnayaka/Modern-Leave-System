<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Leave System - Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }
        
        /* New Navigation Bar */
        .navbar {
            background-color: #007BFF;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .navbar h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }
        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        /* Cards Style */
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .card h3 { margin: 0; color: #666; font-size: 16px; }
        .card p { margin: 10px 0 0 0; font-size: 32px; font-weight: bold; color: #007BFF; }
        
        /* Form & Table Layout */
        .main-content {
            display: flex;
            gap: 20px;
        }
        .form-section {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .table-section {
            flex: 2;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        /* Form Elements */
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #444; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .submit-btn { background-color: #28a745; color: white; border: none; padding: 12px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        .submit-btn:hover { background-color: #218838; }

        /* Table Style */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .approved { background-color: #d4edda; color: #155724; }
        .pending { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<!-- New Navigation Bar with the name you requested -->
<div class="navbar">
    <h2>Welcome to Leave Application System 👋</h2>
    <!-- This links back to your login page -->
    <a href="" class="logout-btn">Logout</a>
</div>

<div class="container">
    <!-- Leave Summary Cards -->
    <div class="cards">
        <div class="card">
            <h3>Total Annual Leaves</h3>
            <p>24</p>
        </div>
        <div class="card">
            <h3>Leaves Taken</h3>
            <p>05</p>
        </div>
        <div class="card">
            <h3>Remaining Leaves</h3>
            <p style="color: #28a745;">19</p>
        </div>
    </div>

    <div class="main-content">
        <!-- Apply Leave Form -->
        <div class="form-section">
            <h3 style="margin-top:0; color:#333;">Apply for Leave</h3>
            <form action="ApplyLeaveServlet" method="POST">
                <label>Leave Type</label>
                <select name="leaveType">
                    <option value="Casual">Casual Leave</option>
                    <option value="Medical">Medical Leave</option>
                    <option value="Annual">Annual Leave</option>
                </select>

                <label>Start Date</label>
                <input type="date" name="startDate" required>

                <label>End Date</label>
                <input type="date" name="endDate" required>

                <label>Reason</label>
                <textarea name="reason" rows="3" required></textarea>

                <button type="submit" class="submit-btn">Submit Request</button>
            </form>
        </div>

        <!-- Leave History Table -->
        <div class="table-section">
            <h3 style="margin-top:0; color:#333;">Your Recent Leave Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>Leave Type</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Medical Leave</td>
                        <td>2026-06-10</td>
                        <td>2026-06-12</td>
                        <td><span class="status approved">Approved</span></td>
                    </tr>
                    <tr>
                        <td>Casual Leave</td>
                        <td>2026-07-05</td>
                        <td>2026-07-06</td>
                        <td><span class="status pending">Pending</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
